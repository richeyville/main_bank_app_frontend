services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bank-app-frontend
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      # Bind the CRA dev server to all interfaces inside the container
      HOST: "0.0.0.0"
      # Backend on the host machine (browser calls this from your machine, not from inside the container)
      REACT_APP_API_URL: https://bank.richeyville.online
      # File watching in Docker on macOS/Windows
      CHOKIDAR_USEPOLLING: "true"
      WDS_SOCKET_HOST: localhost
    restart: unless-stopped
